<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nachobzn — Dashboard</title>
<style>
  :root{
    color-scheme: light;
    --page:#050507;
    --bg:#0c0c10;
    --panel:#131318;
    --panel-2:#1a1a21;
    --ink:#f3f3f6;
    --ink-soft:#92929d;
    --line:rgba(255,255,255,.08);
    --line-soft:rgba(255,255,255,.05);
    --accent:#22c55e;
    --accent-1:#34d399;
    --accent-2:#0ea968;
    --accent-soft:rgba(34,197,94,.16);
    --accent-glow:rgba(34,197,94,.55);
    --green:#3ddc97;
    --green-soft:rgba(61,220,151,.14);
    --amber:#fbbf24;
    --amber-soft:rgba(251,191,36,.14);
    --red:#fb7185;
    --red-soft:rgba(251,113,133,.14);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--page);
    color:var(--ink);
  }
  .app{
    display:flex;
    min-height:calc(100vh - 36px);
    margin:18px;
    background:var(--bg);
    border-radius:24px;
    box-shadow:0 30px 80px -28px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
  }
  .sidebar{
    width:240px;
    flex-shrink:0;
    background:rgba(0,0,0,.18);
    border-right:1px solid var(--line);
    border-radius:24px 0 0 24px;
    padding:18px 14px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:2px 6px 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:16.5px;
    font-weight:700;
    color:var(--ink);
  }
  .brand .ic{
    width:26px; height:26px;
    border-radius:8px;
    background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:#fff; flex-shrink:0;
  }
  .brand .wordmark{ white-space:nowrap; }
  .brand .accent-text{
    background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .collapse-ic{
    width:26px; height:26px;
    border:1px solid var(--line);
    border-radius:7px;
    background:none;
    color:var(--ink-soft);
    font-size:11px;
    cursor:default;
    display:flex; align-items:center; justify-content:center;
  }
  .switcher{
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    border-radius:11px;
    padding:8px 10px;
    margin:0 2px 14px;
  }
  .switcher .savatar{
    width:20px; height:20px; border-radius:6px; flex-shrink:0;
    background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-size:10.5px; font-weight:700; color:#fff;
  }
  .switcher .sname{flex:1; font-size:12.5px; font-weight:600; color:var(--ink);}
  .switcher .schev{color:var(--ink-soft); font-size:10px;}
  .searchbox{
    display:flex; align-items:center; gap:7px;
    background:rgba(255,255,255,.03);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    margin:0 2px 16px;
    color:var(--ink-soft);
    font-size:12.5px;
  }
  .searchbox input{
    background:none; border:none; outline:none;
    color:var(--ink); font-size:12.5px; flex:1; font-family:inherit;
  }
  .searchbox kbd{
    font-size:10px; background:rgba(255,255,255,.06);
    border:1px solid var(--line); border-radius:5px; padding:1px 5px; color:var(--ink-soft);
  }
  .search-results{
    display:none; flex-direction:column; gap:2px;
    margin:-10px 2px 14px; max-height:280px; overflow-y:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:6px;
  }
  .search-results.show{display:flex;}
  .search-results .sr-item{
    display:flex; flex-direction:column; gap:1px; text-align:left;
    padding:7px 9px; border-radius:7px; cursor:pointer;
    background:none; border:none; font-family:inherit; color:var(--ink); width:100%;
  }
  .search-results .sr-item:hover{background:rgba(255,255,255,.06);}
  .search-results .sr-item .sr-title{font-size:12.5px; font-weight:600;}
  .search-results .sr-item .sr-meta{font-size:10.5px; color:var(--ink-soft); margin-top:1px;}
  .search-results .sr-empty{padding:10px; font-size:12px; color:var(--ink-soft); text-align:center;}
  .nav-list{display:flex; flex-direction:column; gap:3px;}
  .sidebar-spacer{flex:1;}
  .profile-card{
    display:flex; align-items:center; gap:9px;
    padding:10px 8px 2px;
    border-top:1px solid var(--line);
    margin-top:10px; padding-top:14px;
  }
  .profile-card .pavatar{
    width:30px; height:30px; border-radius:9px; flex-shrink:0;
    background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:700; color:#fff;
  }
  .profile-card .pinfo{min-width:0;}
  .profile-card .pname{font-size:12.5px; font-weight:600; color:var(--ink);}
  .profile-card .pemail{font-size:10.5px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px;}
  .navbtn{
    position:relative;
    display:flex;
    align-items:center;
    gap:9px;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    padding:10px 11px;
    border-radius:10px;
    font-size:13.5px;
    color:var(--ink-soft);
    cursor:pointer;
    font-family:inherit;
    transition:background .15s ease, color .15s ease;
  }
  .navbtn:hover{background:rgba(255,255,255,.05); color:var(--ink);}
  .navbtn.active{
    background:var(--accent-soft);
    color:var(--ink);
    font-weight:600;
    box-shadow:inset 0 0 0 1px rgba(34,197,94,.4);
  }
  .navbtn.active::before{
    content:"";
    position:absolute;
    left:0; top:8%; bottom:8%;
    width:3px;
    border-radius:2px;
    background:var(--accent);
  }
  .navbtn .ic{font-size:15px; width:18px; text-align:center;}
  .main{flex:1; padding:28px 36px 60px; max-width:1360px;}
  .tabhead{margin-bottom:22px;}
  .tabhead h1{font-size:23px; margin:0 0 4px; color:var(--ink); font-weight:700;}
  .tabhead p{margin:0; color:var(--ink-soft); font-size:13.5px;}
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 20px;
    margin-bottom:18px;
  }
  .panel h2{font-size:14.5px; margin:0 0 12px; font-weight:600; color:var(--ink);}
  .row{display:flex; gap:14px; flex-wrap:wrap;}
  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:18px;}
  .kpi{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    position:relative;
  }
  .kpi .lbl{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
  .kpi .val{font-size:21px; font-weight:700; margin-top:4px; color:var(--ink);}
  .kpi .rm{position:absolute; top:8px; right:8px; cursor:pointer; color:var(--ink-soft); background:none; border:none; font-size:13px;}
  /* ---- Liquidez (cuentas / plata disponible) ---- */
  .accounts-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px;}
  .account-card{background:rgba(255,255,255,.02); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
  .account-balance{font-size:23px; font-weight:700; margin:9px 0 14px;}
  .account-meta{display:flex; align-items:center; gap:8px;}
  .account-totals{margin-top:12px; padding-top:10px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-soft); font-weight:600;}
  /* ---- resumen tipo dashboard (solo se usa en la vista mobile) ---- */
  .mobile-summary{ margin-bottom:6px; }
  .mobile-summary .section-tag{ font-size:11px; color:var(--accent-1); text-transform:uppercase; letter-spacing:.05em; font-weight:700; margin:0 0 8px; }
  .count-chips{ display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:14px; }
  .count-chip{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:center; gap:10px; }
  .count-chip .num{ font-size:20px; font-weight:700; color:var(--ink); }
  .count-chip .lbl{ font-size:11px; color:var(--ink-soft); line-height:1.25; }
  .mini-card-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line); }
  .mini-card-row:last-child{ border-bottom:none; }
  .mini-card-row .title{ font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
  .mini-card-row .meta{ font-size:11px; color:var(--ink-soft); }
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.03em;
    color:var(--ink-soft);
    padding:6px 8px;
    border-bottom:1px solid var(--line);
  }
  td{padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:middle; color:var(--ink);}
  tr:last-child td{border-bottom:none;}
  input[type=text], input[type=date], input[type=number], select, textarea{
    font-family:inherit;
    font-size:13px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:7px;
    background:rgba(255,255,255,.035);
    color:var(--ink);
    width:100%;
    accent-color:var(--accent);
  }
  textarea{resize:vertical; min-height:80px;}
  .cell-input{border:1px solid transparent; background:transparent; padding:5px 6px; width:100%;}
  .cell-input:hover, .cell-input:focus{border-color:var(--line); background:rgba(255,255,255,.05);}
  .tag{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:99px;
  }
  .tag.green{background:var(--green-soft); color:var(--green);}
  .tag.amber{background:var(--amber-soft); color:var(--amber);}
  .tag.red{background:var(--red-soft); color:var(--red);}
  .tag.grey{background:rgba(255,255,255,.07); color:var(--ink-soft);}
  .btn{
    background:linear-gradient(120deg,var(--accent-1),var(--accent-2));
    color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    box-shadow:0 4px 14px -4px var(--accent-glow);
  }
  .btn:hover{opacity:.92;}
  .btn.ghost{
    background:none;
    color:var(--ink-soft);
    border:1px solid var(--line);
    box-shadow:none;
  }
  .btn.small{padding:5px 10px; font-size:12px;}
  .iconbtn{background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:14px; padding:4px;}
  .iconbtn:hover{color:var(--red);}
  .field-label{font-size:12px; font-weight:600; color:var(--ink-soft); margin:14px 0 6px;}
  .field-label:first-child{margin-top:0;}
  .savemark{font-size:11px; color:var(--green); opacity:0; transition:opacity .3s; white-space:nowrap;}
  .savemark.show{opacity:1;}
  .savemark.err{color:var(--amber);}
  .undo-toast{
    position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px);
    background:#1b1b22; border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; display:flex; align-items:center; gap:14px;
    box-shadow:0 20px 50px -18px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
    font-size:13px; color:var(--ink); z-index:9999;
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
    max-width:90vw;
  }
  .undo-toast.show{ opacity:1; transform:translate(-50%,0); pointer-events:auto; }
  .undo-toast .undo-btn{
    background:linear-gradient(120deg,var(--accent-1),var(--accent-2));
    color:#fff; border:none; padding:6px 12px; border-radius:7px;
    font-size:12.5px; font-weight:700; cursor:pointer; font-family:inherit; flex-shrink:0;
  }
  .undo-toast .undo-btn:hover{ opacity:.92; }
  .empty{color:var(--ink-soft); font-size:13px; padding:14px 4px; font-style:italic;}
  .journal-entry{border-left:3px solid var(--accent); padding:8px 12px; margin-bottom:10px; background:rgba(255,255,255,.03); border-radius:0 8px 8px 0;}
  .journal-entry .meta{font-size:11px; color:var(--ink-soft); margin-bottom:3px; display:flex; justify-content:space-between;}
  .journal-entry .txt{font-size:13.5px; white-space:pre-wrap; color:var(--ink);}
  .topbar{display:flex; justify-content:space-between; align-items:center;}
  .progress-wrap{width:100%; background:rgba(255,255,255,.08); border-radius:99px; height:7px; overflow:hidden;}
  .progress-bar{height:100%; background:linear-gradient(90deg,var(--accent-1),var(--accent-2));}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=number]{ -moz-appearance:textfield; appearance:textfield; }
  .seg{display:flex; gap:4px; background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:9px; padding:3px;}
  .seg button{
    background:none; border:none; color:var(--ink-soft); font-size:12px; font-weight:600;
    padding:6px 12px; border-radius:7px; cursor:pointer; font-family:inherit;
  }
  .seg button.active{background:linear-gradient(120deg,var(--accent-1),var(--accent-2)); color:#fff;}

  /* Tablero de Objetivos — estilo Trello/Notion: columnas por estado,
     tarjetas colapsadas que se abren al tocarlas. */
  .kanban{display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:16px; align-items:start;}
  .kanban-col{
    background:rgba(255,255,255,.015); border:1px solid var(--line); border-radius:12px;
    padding:14px; min-width:0;
    display:flex; flex-direction:column; gap:11px;
  }
  .kanban-col-head{display:flex; align-items:center; gap:8px; padding:2px 4px 8px; border-bottom:1px solid var(--line);}
  .kanban-col-head .kdot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .kanban-col-head .kname{flex:1; font-size:12.5px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:.03em;}
  .kanban-col-head .kcount{font-size:11px; color:var(--ink-soft); background:rgba(255,255,255,.06); border-radius:99px; padding:1px 8px;}
  .kanban-empty{font-size:12px; color:var(--ink-soft); text-align:center; padding:18px 8px; border:1.5px dashed var(--line); border-radius:9px;}
  .kcard{
    border:1px solid var(--line); border-radius:11px; background:var(--panel);
    overflow:hidden; cursor:pointer; transition:border-color .15s ease;
  }
  .kcard:hover{border-color:rgba(255,255,255,.18);}
  .kcard.dragging{opacity:.35;}
  .kcard-head{padding:13px 14px 10px;}
  .kcard-title-row{display:flex; align-items:flex-start; gap:9px;}
  .kcard-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:6px;}
  .kcard-title-text{
    flex:1; min-width:0; font-weight:600; font-size:15px; line-height:1.4;
    color:var(--ink); white-space:normal; word-break:break-word;
  }
  .kcard-due{font-size:11px; color:var(--ink-soft); margin:6px 0 0 17px;}
  .kcard-chevron{font-size:11px; color:var(--ink-soft); flex-shrink:0; margin-top:4px; transition:transform .15s ease;}
  .kcard.expanded .kcard-chevron{transform:rotate(180deg); color:var(--accent);}
  .kcard-progress{height:3px; background:rgba(255,255,255,.06);}
  .kcard-progress-fill{height:100%; background:var(--accent);}
  .kcard-body{display:none; flex-direction:column; gap:12px; padding:6px 14px 14px;}
  .kcard.expanded .kcard-body{display:flex;}
  @media (max-width:900px){
    .kanban{grid-template-columns:repeat(2, minmax(0,1fr));}
  }
  @media (max-width:760px){
    .kanban{grid-template-columns:1fr;}
  }
  .currency-pill{font-size:10.5px; font-weight:700; color:var(--ink-soft); background:rgba(255,255,255,.06); border-radius:6px; padding:2px 6px; margin-left:6px;}
  .status-select{font-weight:700; font-size:12px; cursor:pointer;}
  .status-select.status-green{ background:var(--green-soft); color:var(--green); border-color:transparent; }
  .status-select.status-amber{ background:var(--amber-soft); color:var(--amber); border-color:transparent; }
  .status-select.status-red{ background:var(--red-soft); color:var(--red); border-color:transparent; }
  .status-select.status-grey{ background:rgba(255,255,255,.07); color:var(--ink-soft); border-color:transparent; }
  .status-summary{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .status-chip{
    flex:1; min-width:150px; border-radius:var(--radius); padding:10px 14px; border:1px solid var(--line);
    display:flex; align-items:center; gap:10px;
  }
  .status-chip .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .status-chip .dot.green{background:var(--green);}
  .status-chip .dot.amber{background:var(--amber);}
  .status-chip .dot.red{background:var(--red);}
  .status-chip .txt{min-width:0;}
  .status-chip .lbl2{font-size:11px; color:var(--ink-soft);}
  .status-chip .val2{font-size:14.5px; font-weight:700; color:var(--ink);}
  .chart-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .chart-box{height:230px; position:relative;}
  .chart-box .chart-empty{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:12.5px; font-style:italic;}
  @media (max-width:680px){ .chart-grid{grid-template-columns:1fr;} }
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:10px;}
  .cal-dow{font-size:10.5px; color:var(--ink-soft); text-align:center; text-transform:uppercase; padding-bottom:4px;}
  .cal-cell{
    aspect-ratio:1; border-radius:8px; border:1px solid var(--line); background:rgba(255,255,255,.02);
    padding:5px 6px; font-size:11.5px; color:var(--ink-soft); position:relative; cursor:default;
  }
  .cal-cell.empty{border:none; background:none;}
  .cal-cell.today{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  .cal-cell .n{font-weight:600; color:var(--ink);}
  .cal-dot{position:absolute; bottom:5px; left:6px; width:5px; height:5px; border-radius:50%; background:linear-gradient(120deg,var(--accent-1),var(--accent-2));}
  .event-row{display:flex; align-items:center; gap:10px; padding:8px 4px; border-bottom:1px solid var(--line);}
  .event-row:last-child{border-bottom:none;}
  .event-date{
    width:46px; flex-shrink:0; text-align:center; background:rgba(255,255,255,.04); border-radius:8px; padding:5px 0;
    font-size:10.5px; color:var(--ink-soft); font-weight:600; line-height:1.2;
  }
  .event-date .d{font-size:15px; color:var(--ink);}
  @media (max-width:760px){
    body{ -webkit-text-size-adjust:100%; }
    .app{flex-direction:column; margin:0; border-radius:0; min-height:100vh; box-shadow:none;}
    .sidebar{
      width:100%; flex-direction:row; align-items:center; overflow-x:auto; -webkit-overflow-scrolling:touch;
      border-radius:0; padding:8px 10px; gap:0; border-right:none; border-bottom:1px solid var(--line);
      position:sticky; top:0; z-index:5; background:#0c0c10;
    }
    .brand-row{padding:0 8px 0 0; flex-shrink:0;}
    .collapse-ic, .switcher, .searchbox, .search-results, .profile-card, .sidebar-spacer{display:none;}
    .nav-list{flex-direction:row; flex-shrink:0; gap:2px;}
    .navbtn{flex-direction:column; gap:2px; padding:6px 10px; font-size:10.5px; white-space:nowrap;}
    .navbtn .ic{width:auto; font-size:16px;}
    .navbtn.active::after{display:none;}
    .main{padding:16px 14px 40px;}
    .tabhead h1{font-size:19px;}
    .kpis{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));}
    .panel{padding:14px 14px;}
    .status-summary{flex-direction:column;}

    /* tablas: se mantienen como tabla compacta con scroll horizontal (igual que antes),
       solo se les da más espacio a las columnas de texto para que no se corten */
    table{font-size:12px;}
    th, td{padding:6px 5px;}

function fmtMoney(n){

function fmtQty(n){
  n = Number(n)||0;
  if(n===0) return "0";
  const decimals = Math.abs(n) < 1 ? 8 : (Math.abs(n) < 100 ? 4 : 2);
  let s = n.toFixed(decimals);
  if(s.indexOf(".")!==-1) s = s.replace(/0+$/,"").replace(/\.$/,"");
  return s;
}
function parseTargets(str){

// dado un monto invertido (ej. en USDT) y un precio, calcula cuánta cantidad
// del activo se compró/vendió — así el usuario no tiene que sacar la cuenta a mano
function calcQtyFromAmountPrice(amount, price){
  const a = Number(amount), p = Number(price);
  if(!a || !p) return null;
  const q = a/p;
  if(!isFinite(q)) return null;
  return Math.round(q*1e8)/1e8;
}
function fmtDateNice(iso){

function loadLocalCache(){

  }catch(e){ return defaultData(); }

async function loadRemote(){
  const cached = loadLocalCache();
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/dashboard_data?id=eq.${ROW_ID}&select=data`,
      { headers:{ apikey: SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if(res.ok){
      const rows = await res.json();
      if(rows && rows[0] && rows[0].data){
        const merged = Object.assign(defaultData(), rows[0].data);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        return merged;
      }
    }
  }catch(e){ console.warn("Sin conexión a Supabase, uso copia local", e); }
  return cached;
}

let activeTab = "objetivos";

function buildSidebar(){
  const sb = document.getElementById("navList");

    b.onclick = ()=>{ activeTab = t.id; renderAll(); };

  });
  setupGlobalSearch();
}

// Búsqueda del sidebar: busca por título/nombre/descripción en todas las
// secciones y muestra resultados clickeables que saltan a la pestaña correspondiente.
function runGlobalSearch(query){
  const q = (query||"").trim().toLowerCase();
  if(!q) return [];
  const results = [];
  const push = (tab, title, meta)=>{
    const hay = (String(title||"")+" "+String(meta||"")).toLowerCase();
    if(hay.includes(q)) results.push({tab, title: title || "(sin título)", meta: meta || ""});
  };
  DATA.goals.forEach(g=> push("objetivos", g.title, [g.category,g.status].filter(Boolean).join(" · ")));
  DATA.finances.forEach(f=> push("finanzas", f.desc, [f.category,f.type].filter(Boolean).join(" · ")));
  DATA.investments.forEach(i=> push("inversiones", i.asset, [i.type,i.platform].filter(Boolean).join(" · ")));
  DATA.clients.forEach(c=> push("clientes", c.name, [c.status,c.contact].filter(Boolean).join(" · ")));
  DATA.tasks.forEach(t=> push("tareas", t.title, t.status||""));
  DATA.events.forEach(e=> push("calendario", e.title, e.date||""));
  DATA.content.forEach(c=> push("contenido", c.tema, [c.format,c.category].filter(Boolean).join(" · ")));
  DATA.contentPlan.forEach(c=> push("plancontenido", c.title, [c.platform,c.status].filter(Boolean).join(" · ")));
  (DATA.notes.entries||[]).forEach(n=> push("notas", n.text ? n.text.slice(0,60) : "", ""));
  return results.slice(0, 30);
}

function renderSearchResults(query){
  const box = document.getElementById("searchResults");
  if(!box) return;
  const q = (query||"").trim();
  box.innerHTML = "";
  if(!q){ box.classList.remove("show"); return; }
  const results = runGlobalSearch(q);
  if(results.length===0){
    const e = document.createElement("div"); e.className="sr-empty"; e.textContent="Sin resultados";
    box.appendChild(e);
  } else {
    const tabLabel = {}; TABS.forEach(t=> tabLabel[t.id]=t.label);
    results.forEach(r=>{
      const item = document.createElement("button"); item.className="sr-item"; item.type="button";
      const t = document.createElement("span"); t.className="sr-title"; t.textContent = r.title;
      const m = document.createElement("span"); m.className="sr-meta";
      m.textContent = (tabLabel[r.tab]||r.tab) + (r.meta ? " · "+r.meta : "");
      item.appendChild(t); item.appendChild(m);
      item.onclick = ()=>{
        activeTab = r.tab;
        const inp = document.getElementById("globalSearch");
        if(inp) inp.value = "";
        box.innerHTML = ""; box.classList.remove("show");
        renderAll();
      };
      box.appendChild(item);
    });
  }
  box.classList.add("show");
}

function setupGlobalSearch(){
  const inp = document.getElementById("globalSearch");
  const box = document.getElementById("searchResults");
  if(!inp || !box) return;
  inp.addEventListener("input", ()=> renderSearchResults(inp.value));
  inp.addEventListener("focus", ()=>{ if(inp.value.trim()) renderSearchResults(inp.value); });
  inp.addEventListener("keydown", (e)=>{
    if(e.key === "Escape"){ inp.value=""; box.innerHTML=""; box.classList.remove("show"); inp.blur(); }
  });
  document.addEventListener("click", (e)=>{
    if(!box.contains(e.target) && e.target!==inp){ box.classList.remove("show"); }
  });
  document.addEventListener("keydown", (e)=>{
    if((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==="k"){
      e.preventDefault(); inp.focus(); inp.select();
    }
  });
}

function renderAll(){
  // preservar foco + cursor del campo que se estaba editando, para que
  // un re-render (por ej. al recalcular totales/gráficos) no interrumpa la escritura
  const active = document.activeElement;
  let focusId = null, selStart = null, selEnd = null;
  try{
    if(active && active.dataset && active.dataset.focusId){
      focusId = active.dataset.focusId;
      if(typeof active.selectionStart === "number"){
        selStart = active.selectionStart;
        selEnd = active.selectionEnd;
      }
    }
  }catch(e){ /* algunos inputs (number) no soportan selectionStart */ }

  // preservar la posición de scroll: reconstruir #tabContent no debería
  // "teletransportar" al usuario arriba de todo cada vez que escribe,
  // agrega algo o abre/cierra un desplegable
  const scrollX = window.scrollX || document.documentElement.scrollLeft || 0;
  const scrollY = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;

  TABS.forEach(t=>{
    document.getElementById("nav-"+t.id).classList.toggle("active", t.id===activeTab);
  });
  const t = TABS.find(x=>x.id===activeTab);
  document.getElementById("tabTitle").textContent = t.label;
  document.getElementById("tabDesc").textContent = t.desc;
  const c = document.getElementById("tabContent");
  c.innerHTML = "";
  RENDERERS[activeTab](c);

  if(focusId){
    const el = c.querySelector(`[data-focus-id="${CSS.escape(focusId)}"]`);
    if(el){
      el.focus();
      if(selStart!=null){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }

  window.scrollTo(scrollX, scrollY);
  if(typeof requestAnimationFrame === "function"){
    requestAnimationFrame(()=>window.scrollTo(scrollX, scrollY));
  } else {
    setTimeout(()=>window.scrollTo(scrollX, scrollY), 0);
  }
}

/* ---------- papelera / deshacer ----------
   Ningún borrado en el dashboard es definitivo al toque: todo lo que se
   elimina (movimientos, compras, clientes, tareas, notas, etc.) pasa por acá,
   que lo manda a DATA.trash en vez de perderlo. Desde ahí se puede restaurar
   con el toast de "Deshacer" que aparece al toque, o más tarde desde la
   pestaña Papelera. */

const TRASH_SECTION_LABEL = {
  goals:"Objetivos", finances:"Finanzas", investments:"Inversiones · Posiciones",
  invPurchases:"Inversiones · Compras y ventas", clients:"Clientes", tasks:"Tareas pendientes",
  events:"Calendario", stats:"Estadísticas", content:"Contenido · Reels y carruseles",
  stories:"Contenido · Historias", contentPlan:"Plan de contenido", notesEntries:"Notas mentales",
  accounts:"Finanzas · Liquidez"
};

function labelForTrashItem(listKey, item){
  switch(listKey){
    case "goals": return item.title || "Objetivo sin título";
    case "finances": return (item.desc || item.category || "Movimiento") + (item.type ? " · "+item.type : "");
    case "investments": return "Posición: " + (item.asset || "sin nombre");
    case "invPurchases": return (item.asset || "Operación") + " · " + (item.operation || "Compra");
    case "clients": return item.name || "Cliente sin nombre";
    case "tasks": return item.title || "Tarea sin título";
    case "events": return item.title || "Evento sin título";
    case "stats": return item.label || "Estadística";
    case "content": return item.tema || (item.format || "Contenido");
    case "stories": return item.tema || "Historia";
    case "contentPlan": return item.title || "Idea sin título";
    case "notesEntries": return (item.text || "").slice(0,70) || "Nota";
    case "accounts": return item.name || "Cuenta sin nombre";
    default: return "Elemento";
  }
}

function softDelete(listKey, item){
  if(!DATA.trash) DATA.trash = [];
  DATA.trash.unshift({ id:uid(), listKey, item, deletedAt:new Date().toISOString() });
  if(listKey==="notesEntries"){
    DATA.notes.entries = DATA.notes.entries.filter(x=>x.id!==item.id);
  } else {
    DATA[listKey] = (DATA[listKey]||[]).filter(x=>x.id!==item.id);
  }
  save();
  renderAll();
  showUndoToast(listKey, item);
}

function restoreTrashItem(trashId){
  const entry = (DATA.trash||[]).find(t=>t.id===trashId);
  if(!entry) return;
  DATA.trash = DATA.trash.filter(t=>t.id!==trashId);
  if(entry.listKey==="notesEntries"){
    DATA.notes.entries.unshift(entry.item);
  } else {
    if(!DATA[entry.listKey]) DATA[entry.listKey] = [];
    DATA[entry.listKey].unshift(entry.item);
  }
  save();
  renderAll();
}

function purgeTrashItem(trashId){
  DATA.trash = (DATA.trash||[]).filter(t=>t.id!==trashId);
  save();
  renderAll();
}

let undoToastTimer = null;
function showUndoToast(listKey, item){
  const toast = document.getElementById("undoToast");
  if(!toast) return;
  const label = labelForTrashItem(listKey, item);
  const span = document.createElement("span");
  span.textContent = "Eliminado: " + label;
  const btn = document.createElement("button");
  btn.className = "undo-btn"; btn.textContent = "Deshacer";
  btn.onclick = ()=>{
    const entry = (DATA.trash||[]).find(t=>t.listKey===listKey && t.item.id===item.id);
    if(entry) restoreTrashItem(entry.id);
    hideUndoToast();
  };
  toast.innerHTML = "";
  toast.appendChild(span);
  toast.appendChild(btn);
  toast.classList.add("show");
  clearTimeout(undoToastTimer);
  undoToastTimer = setTimeout(hideUndoToast, 7000);
}
function hideUndoToast(){
  const toast = document.getElementById("undoToast");
  if(toast) toast.classList.remove("show");
}

function renderPapelera(container){
  const trash = DATA.trash || [];
  const panel = document.createElement("div"); panel.className="panel";
  const head = document.createElement("div");
  head.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;";
  head.innerHTML = `<h2 style="margin:0;">Elementos eliminados</h2>`;
  if(trash.length){
    const clearBtn = document.createElement("button");
    clearBtn.className="btn ghost small"; clearBtn.textContent="Vaciar papelera";
    clearBtn.onclick=()=>{
      if(confirm("¿Vaciar la papelera? Esta acción no se puede deshacer.")){
        DATA.trash = [];
        save(); renderAll();
      }
    };
    head.appendChild(clearBtn);
  }
  panel.appendChild(head);

  if(trash.length===0){
    const e=document.createElement("div"); e.className="empty"; e.textContent="No hay nada eliminado — todo lo que borres en cualquier pestaña va a aparecer acá para que puedas recuperarlo.";
    panel.appendChild(e);
  } else {
    const tableWrap = document.createElement("div"); tableWrap.style.overflowX="auto";
    const table = document.createElement("table"); table.className="rtable";
    table.innerHTML = `<thead><tr><th>Sección</th><th>Elemento</th><th>Eliminado</th><th></th></tr></thead>`;
    const tbody = document.createElement("tbody");
    trash.forEach(entry=>{
      const tr = document.createElement("tr");
      tr.appendChild(td("Sección", document.createTextNode(TRASH_SECTION_LABEL[entry.listKey] || entry.listKey)));
      tr.appendChild(td("Elemento", document.createTextNode(labelForTrashItem(entry.listKey, entry.item))));
      const d = new Date(entry.deletedAt);
      const whenStr = isNaN(d) ? "—" : d.toLocaleString("es-AR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
      tr.appendChild(td("Eliminado", document.createTextNode(whenStr)));
      const actions = document.createElement("div"); actions.style.cssText="display:flex;gap:8px;justify-content:flex-end;";
      const restoreBtn = document.createElement("button"); restoreBtn.className="btn small"; restoreBtn.textContent="Restaurar";
      restoreBtn.onclick=()=>restoreTrashItem(entry.id);
      const purgeBtn = document.createElement("button"); purgeBtn.className="iconbtn"; purgeBtn.textContent="✕"; purgeBtn.title="Eliminar definitivamente";
      purgeBtn.onclick=()=>purgeTrashItem(entry.id);
      actions.appendChild(restoreBtn); actions.appendChild(purgeBtn);
      tr.appendChild(td(null, actions));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    panel.appendChild(tableWrap);
  }
  container.appendChild(panel);
}

/* ---------- generic helpers ---------- */

function debounce(fn, wait=700){
  let t;
  return function(...args){
    clearTimeout(t);
    t = setTimeout(()=>fn.apply(this,args), wait);
  };
}
const debouncedRenderAll = debounce(()=>renderAll(), 800);

function makeSelect(value, options, onChange){
  const sel = document.createElement("select");
  sel.className = "cell-input";
  options.forEach(o=>{
    const op = document.createElement("option");
    op.value = o; op.textContent = o;
    if(o===value) op.selected = true;
    sel.appendChild(op);
  });
  sel.onchange = ()=>onChange(sel.value);
  return sel;
}
function makeTextInput(value, onChange, type="text", placeholder="", focusId=null){
  const inp = document.createElement("input");
  inp.type = type;
  inp.className = "cell-input";
  inp.value = value || "";
  inp.placeholder = placeholder;
  if(focusId) inp.dataset.focusId = focusId;
  inp.oninput = ()=>onChange(inp.value);
  return inp;
}
// Crea una <td> con data-label: en desktop es invisible (columna normal),
// en mobile la tabla se convierte en tarjetas y el label aparece al lado del valor.
function td(label, child){
  const cell = document.createElement("td");
  if(label) cell.dataset.label = label;
  cell.appendChild(child);
  return cell;
}

const STATUS_COLOR = { "Confirmado":"green", "A confirmar":"amber", "No confirmado":"red" };
function makeStatusSelect(value, onChange){
  const sel = document.createElement("select");
  const cls = STATUS_COLOR[value] || "amber";
  sel.className = "cell-input status-select status-"+cls;
  ["Confirmado","A confirmar","No confirmado"].forEach(o=>{
    const op = document.createElement("option");
    op.value = o; op.textContent = o;
    if(o===value) op.selected = true;
    sel.appendChild(op);
  });
  sel.onchange = ()=>{
    const newCls = STATUS_COLOR[sel.value] || "amber";
    sel.className = "cell-input status-select status-"+newCls;
    onChange(sel.value);
  };
  return sel;
}
function tagFor(status){
  const map = {
    "Cumplido":"green","Activo":"green","Publicado":"green","Hecho":"green","Pagado":"green",

// tarjetas abiertas (desglosadas) — solo estado visual en memoria, no se guarda
let expandedGoalIds = new Set();

function fmtDeadlineShort(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d)) return "";
  return d.toLocaleDateString("es-AR",{day:"2-digit",month:"short"});
}

// mueve una tarjeta a otra columna (cambia estado) y la deja arriba de esa
// columna — así el tablero refleja tanto el estado como la prioridad relativa
function moveGoalToStatus(goalId, newStatus){
  const g = DATA.goals.find(x=>x.id===goalId);
  if(!g || g.status===newStatus) return;
  const idx = DATA.goals.indexOf(g);
  DATA.goals.splice(idx,1);
  g.status = newStatus;
  DATA.goals.unshift(g);
  save(); renderAll();
}

// mueve una tarjeta un lugar arriba/abajo dentro de su propia columna,
// preservando el orden dentro de las demás — así se puede fijar prioridad
// a mano sin necesidad de arrastrar (útil en mobile).
function moveGoalWithinStatus(g, dir){
  const sameStatus = DATA.goals.filter(x=>x.status===g.status);
  const idx = sameStatus.indexOf(g);
  const swapIdx = idx+dir;
  if(swapIdx<0 || swapIdx>=sameStatus.length) return;
  const other = sameStatus[swapIdx];
  const gi = DATA.goals.indexOf(g), oi = DATA.goals.indexOf(other);
  DATA.goals[gi] = other; DATA.goals[oi] = g;
  save(); renderAll();
}

function finPeriodFilter(f){
  if(!f.date) return finPeriod==="todo";
  const d = new Date(f.date+"T00:00:00");
  if(isNaN(d)) return finPeriod==="todo";
  const now = new Date();
  if(finPeriod==="diario"){
    return d.toDateString()===now.toDateString();
  }
  if(finPeriod==="mensual"){
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  }
  if(finPeriod==="anual"){
    return d.getFullYear()===now.getFullYear();
  }
  return true; // todo
}

let finExpandedMonths = {};

function groupFinByMonth(items){
  const groups = {};
  items.forEach(f=>{
    let key = "Sin fecha";
    if(f.date){
      const d = new Date(f.date+"T00:00:00");
      if(!isNaN(d)) key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    }
    (groups[key] ||= []).push(f);
  });
  return groups;
}
function finMonthLabel(key){
  if(key==="Sin fecha") return "Sin fecha";
  const [y,m] = key.split("-");
  const txt = new Date(Number(y), Number(m)-1, 1).toLocaleDateString("es-AR",{month:"long",year:"numeric"});
  return txt.charAt(0).toUpperCase()+txt.slice(1);
}
function finMonthSubtotal(items){
  const byCur = {};
  items.forEach(f=>{
    const cur = f.currency||"ARS";
    byCur[cur] = (byCur[cur]||0) + (Number(f.amount)||0);
  });
  return Object.entries(byCur).map(([cur,amt])=>`${CURRENCY_SYMBOL[cur]??""}${fmtMoney(amt)} ${cur}`).join(" · ") || "—";
}

function renderMovementsPanel(container, fin, type, color){
  const label = type==="Ingreso" ? "Ingresos" : "Gastos";

  const panel = document.createElement("div"); panel.className="panel";
  const head = document.createElement("div");

  const addBtn = document.createElement("button");
  addBtn.className="btn small"; addBtn.textContent="+ Nuevo "+(type==="Ingreso"?"ingreso":"gasto");
  addBtn.onclick=()=>{
    DATA.finances.unshift({id:uid(), date:todayISO(), desc:"", type:type, category:"", currency:(finCurrency&&finCurrency!=="Todo")?finCurrency:"ARS", amount:"", status:"Confirmado", account:""});

    });

      const monthItems = grouped[key];
      const stateKey = type+"-"+key;
      if(finExpandedMonths[stateKey]===undefined) finExpandedMonths[stateKey] = (idx===0);

// Valor actual de la cartera de Inversiones (misma cuenta que "Valor actual"
// en la tabla de Posiciones: cantidad x precio actual, o costo si todavía no
// cargaste un precio actual) — sirve para que la cuenta "Crypto" de Liquidez
// se mueva sola con la cotización, en vez de quedar en un número fijo.
function computeInvestmentsCurrentValue(){
  let total = 0;
  (DATA.investments||[]).forEach(i=>{
    const qty = Number(i.qty)||0;
    const hasCurrent = i.currentPrice!==undefined && i.currentPrice!=="";
    const price = hasCurrent ? Number(i.currentPrice) : (Number(i.unitCost)||0);
    total += qty*price;
  });
  return total;
}

// Disponible de una cuenta:
// - si está "vinculada a Inversiones" (acc.linked), el disponible ES el valor
//   actual de la cartera — sube y baja solo con la cotización.
// - si no, es el saldo base (lo que el usuario cargó a mano al crearla) más
//   todos los ingresos vinculados menos todos los gastos vinculados. Se
//   recalcula siempre a partir de los movimientos, así nunca se desincroniza
//   aunque se edite un monto o se borre un movimiento.
function computeAccountBalance(acc){
  if(acc.linked){
    return computeInvestmentsCurrentValue();
  }
  let bal = Number(acc.opening)||0;
  DATA.finances.forEach(f=>{
    if(f.account && f.account===acc.id){
      const amt = Number(f.amount)||0;
      bal += (f.type==="Ingreso" ? amt : -amt);
    }
  });
  return bal;
}

// A partir del historial de compras/ventas de un activo, calcula la cantidad
// neta en cartera y el precio promedio ponderado (costo base), reduciendo el
// costo proporcionalmente cada vez que hay una venta.
function computePositionFromPurchases(asset, purchases){
  // Solo las operaciones de "Compra" cuentan para la posición actual: las
  // ventas quedan registradas en el historial (y afectan el neto invertido en
  // los gráficos de Gráficos/Movimientos), pero no restan de la cantidad en
  // cartera — a pedido explícito, porque no todas las ventas cargadas
  // corresponden a la tenencia vigente.
  const ops = purchases.filter(p=>p.asset===asset && p.operation!=="Venta");
  let qty=0, cost=0;
  ops.forEach(p=>{
    qty += Number(p.qty)||0;
    cost += Number(p.amount)||0;
  });
  const unitCost = qty>0 ? cost/qty : 0;
  return { qty: Math.round(qty*1e8)/1e8, unitCost: Math.round(unitCost*1e8)/1e8 };
}

// mantiene la tabla de Posiciones sincronizada con el historial de compras:
// cada vez que se agrega, edita o borra una operación, la cantidad y el
// precio promedio de esa cripto se recalculan solos (currentPrice, objetivos
// de venta, plataforma y notas quedan intactos porque son datos manuales).
function syncPositionsFromPurchases(){
  const purchases = DATA.invPurchases || [];
  const assetsWithPurchases = Array.from(new Set(purchases.map(p=>p.asset).filter(Boolean)));
  assetsWithPurchases.forEach(asset=>{
    const { qty, unitCost } = computePositionFromPurchases(asset, purchases);
    let pos = DATA.investments.find(p=>p.asset===asset);
    if(!pos){
      pos = {id:uid(), date:todayISO(), type:"Crypto", asset, qty:0, unitCost:0, currency:"USDT", currentPrice:"", platform:"", sellTargets:"", notes:""};
      DATA.investments.push(pos);
    }
    pos.qty = qty;
    pos.unitCost = unitCost;
  });
}

const crosshairPlugin = {
  id: "crosshairLine",
  afterDraw(chart){
    const active = chart.tooltip && chart.tooltip.getActiveElements ? chart.tooltip.getActiveElements() : (chart.tooltip && chart.tooltip._active);
    if(active && active.length){
      const ctx = chart.ctx;
      const x = active[0].element.x;
      const yScale = chart.scales.y;
      if(!yScale) return;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, yScale.top);
      ctx.lineTo(x, yScale.bottom);
      ctx.lineWidth = 1;
      ctx.strokeStyle = "rgba(255,255,255,.35)";
      ctx.setLineDash([4,4]);
      ctx.stroke();
      ctx.restore();
    }
  }
};

// Lectura objetiva de cada posición: qué tan lejos está del próximo objetivo
// de venta y cómo viene contra el precio promedio de compra. Es información,
// no una recomendación — la decisión de tomar ganancias o seguir comprando
// queda siempre del lado del usuario.
function computeAssetSignal(pos){
  const qty = Number(pos.qty)||0;
  if(qty<=0) return null;
  const unitCost = Number(pos.unitCost)||0;
  const hasCurrent = pos.currentPrice!==undefined && pos.currentPrice!=="";
  const price = hasCurrent ? Number(pos.currentPrice) : unitCost;
  const gainPct = unitCost>0 ? ((price/unitCost)-1)*100 : 0;
  const targets = parseTargets(pos.sellTargets).sort((a,b)=>a-b);
  const reachedCount = targets.filter(t=>price>=t).length;
  const nextTarget = targets.find(t=>price<t);
  const distancePct = (nextTarget && price>0) ? ((nextTarget/price)-1)*100 : null;
  return { asset: pos.asset, price, unitCost, gainPct, targets, nextTarget, reachedCount, distancePct, hasCurrent };
}

function renderInvestmentFeedback(container){
  const positions = (DATA.investments||[]).filter(p=>p.asset && (Number(p.qty)||0)>0);
  if(positions.length===0) return;

  const panel = document.createElement("div"); panel.className="panel";
  panel.innerHTML = `<h2 style="margin:0 0 4px;">Feedback en tiempo real</h2>
    <p style="margin:0 0 14px;font-size:12px;color:var(--ink-soft);">Lectura objetiva de cada posición contra tu precio promedio y tus objetivos de venta — es información para decidir vos, no una recomendación de compra o venta.</p>`;

  const list = document.createElement("div"); list.style.cssText="display:flex;flex-direction:column;gap:10px;";
  positions.forEach(pos=>{
    const sig = computeAssetSignal(pos);
    if(!sig) return;
    const row = document.createElement("div");
    row.style.cssText = "display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:13px 15px;border:1px solid var(--line);border-radius:10px;";

    const left = document.createElement("div"); left.style.cssText="flex:1;min-width:180px;";
    const nameEl = document.createElement("div"); nameEl.style.cssText="font-weight:700;font-size:13.5px;color:var(--ink);"; nameEl.textContent=sig.asset;
    left.appendChild(nameEl);

    let tagText, tagColor;
    if(!sig.hasCurrent){
      tagText = "Cargá un precio actual para ver la señal";
      tagColor = "var(--ink-soft)";
    } else if(sig.targets.length===0){
      tagText = `${sig.gainPct>=0?"+":""}${sig.gainPct.toFixed(1)}% vs. promedio de compra · sin objetivos de venta definidos`;
      tagColor = sig.gainPct>=0 ? "var(--green)" : "var(--red)";
    } else if(sig.reachedCount>=sig.targets.length){
      tagText = `Todos los objetivos de venta alcanzados (${sig.gainPct>=0?"+":""}${sig.gainPct.toFixed(1)}%)`;
      tagColor = "var(--green)";
    } else if(sig.reachedCount>0){
      tagText = `TP${sig.reachedCount} alcanzado · faltan ${sig.distancePct.toFixed(1)}% para TP${sig.reachedCount+1}`;
      tagColor = "var(--green)";
    } else if(sig.distancePct!==null && sig.distancePct<=10){
      tagText = `Cerca de TP1 — a ${sig.distancePct.toFixed(1)}% de distancia`;
      tagColor = "var(--amber)";
    } else if(sig.gainPct<0){
      tagText = `${sig.gainPct.toFixed(1)}% por debajo del promedio de compra`;
      tagColor = "var(--red)";
    } else {
      tagText = `+${sig.gainPct.toFixed(1)}% vs. promedio · faltan ${sig.distancePct!==null?sig.distancePct.toFixed(1)+"%":"—"} para TP1`;
      tagColor = "var(--ink)";
    }
    const tagEl = document.createElement("div"); tagEl.style.cssText=`font-size:12px;margin-top:3px;color:${tagColor};`; tagEl.textContent=tagText;
    left.appendChild(tagEl);
    row.appendChild(left);

    const priceEl = document.createElement("div");
    priceEl.style.cssText = "text-align:right;flex-shrink:0;";
    priceEl.innerHTML = `<div style="font-size:14px;font-weight:700;color:var(--ink);">$${fmtMoney(sig.price)}</div><div style="font-size:10.5px;color:var(--ink-soft);">promedio $${fmtMoney(sig.unitCost)}</div>`;
    row.appendChild(priceEl);

    list.appendChild(row);
  });

  container.appendChild(panel);

function renderAggregateTargets(container){
  const positions = (DATA.investments||[]).filter(p=>p.asset);
  if(positions.length===0) return;
  const anyTargets = positions.some(p=>parseTargets(p.sellTargets).length>0);
  if(!anyTargets) return;

  const panel = document.createElement("div"); panel.className="panel";
  panel.innerHTML = `<h2 style="margin:0 0 4px;">Objetivos de venta combinados</h2>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;">Si cada activo llega a su propio TP1 / TP2 / TP3 al mismo tiempo, esto es lo que pasaría con toda la cartera junta.</div>`;

  const row = document.createElement("div");
  row.style.cssText="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px;";

  [0,1,2].forEach(levelIdx=>{
    let totalInvested=0, totalValue=0;
    const includedAssets = [];
    positions.forEach(p=>{
      const targets = parseTargets(p.sellTargets);
      if(targets.length>levelIdx){
        const qty = Number(p.qty)||0;
        const avgCost = Number(p.unitCost)||0;
        totalInvested += qty*avgCost;
        totalValue += qty*targets[levelIdx];
        includedAssets.push(p.asset);
      }
    });
    const gain = totalValue - totalInvested;
    const gainPct = totalInvested ? (gain/totalInvested*100) : 0;
    const gc = gain>=0 ? "var(--green)" : "var(--red)";

    const card = document.createElement("div");
    card.style.cssText="background:rgba(255,255,255,.02); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;";
    if(includedAssets.length===0){
      card.innerHTML = `<div style="font-size:13px;font-weight:700;margin-bottom:8px;">TP${levelIdx+1}</div>
        <div class="empty" style="padding:0;">Ningún activo tiene este nivel definido todavía.</div>`;
    } else {
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:700;">TP${levelIdx+1}</div>
          <div style="font-size:11px;color:var(--ink-soft);">${includedAssets.length} activo${includedAssets.length>1?"s":""}</div>
        </div>
        <div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;">Valor total si vendo todo</div>
        <div style="font-size:20px;font-weight:700;color:var(--ink);margin-bottom:8px;">$${fmtMoney(totalValue)}</div>
        <div style="font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;">Ganancia combinada</div>
        <div style="font-size:16px;font-weight:700;color:${gc};">${gain>=0?"+":""}$${fmtMoney(gain)} (${gainPct>=0?"+":""}${gainPct.toFixed(1)}%)</div>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:10px;">${includedAssets.join(", ")}</div>
      `;
    }
    row.appendChild(card);
  });

  panel.appendChild(row);
  container.appendChild(panel);
}

// Fila de tarea: el título es lo protagonista (grande, sin recortarse) y el
// estado se elige con un solo select de color — sin fecha ni área, que no se
// usaban. Misma fila para desktop y mobile, porque ya entra cómoda en cualquier ancho.
function renderTaskRow(t){
  const row = document.createElement("div");
  row.style.cssText="display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line);";

  const titleInp = makeTextInput(t.title, v=>{t.title=v; save();}, "text", "Tarea...");
  titleInp.style.cssText="flex:1;font-size:16px;min-width:0;border:none;background:none;padding:5px 2px;";
  if(t.status==="Hecha"){ titleInp.style.textDecoration="line-through"; titleInp.style.color="var(--ink-soft)"; }
  row.appendChild(titleInp);

  const statusSel = makeTaskStatusSelect(t.status, v=>{
    t.status=v; t.done=(v==="Hecha");
    // se guarda cuándo pasó a "Hecha" para poder limpiarla sola a las 48hs;
    // si se destilda, se cancela ese conteo.
    if(v==="Hecha"){ if(!t.completedAt) t.completedAt = new Date().toISOString(); }
    else { t.completedAt = null; }
    save(); renderAll();
  });
  statusSel.style.cssText="width:auto;min-width:130px;flex-shrink:0;";
  row.appendChild(statusSel);

  const del = document.createElement("button"); del.className="iconbtn"; del.textContent="✕"; del.style.flexShrink="0";
  del.onclick=()=>{ softDelete("tasks", t); };
  row.appendChild(del);

  return row;
}

// Las tareas marcadas "Hecha" se auto-eliminan (van a la Papelera, no se
// pierden) 48hs después de haberse marcado, para no acumular una lista
// infinita de cosas ya resueltas. Se corre cada vez que se entra a Tareas y
// también en un intervalo de fondo, para que funcione aunque no visites la pestaña.
const TASK_AUTOCLEAN_HOURS = 48;
function autoDeleteStaleTasks(){
  const cutoff = Date.now() - TASK_AUTOCLEAN_HOURS*60*60*1000;
  let changed = false;
  DATA.tasks = DATA.tasks.filter(t=>{
    if(t.status==="Hecha" && t.completedAt){
      const ts = new Date(t.completedAt).getTime();
      if(!isNaN(ts) && ts < cutoff){
        if(!DATA.trash) DATA.trash = [];
        DATA.trash.unshift({ id:uid(), listKey:"tasks", item:t, deletedAt:new Date().toISOString() });
        changed = true;
        return false;
      }
    }
    return true;
  });
  if(changed) save();
  return changed;
}

function renderTareas(container){
  DATA.tasks.forEach(t=>{
    if(t.status===undefined) t.status = t.done ? "Hecha" : "No realizada";
    // migración: tareas que ya estaban en "Hecha" antes de esta función
    // arrancan su cuenta regresiva de 48hs recién ahora, no de golpe.
    if(t.status==="Hecha" && t.completedAt===undefined) t.completedAt = new Date().toISOString();
  });
  autoDeleteStaleTasks();

  if(isMobileView()) renderMobileTareasSummary(container);

  const panel = document.createElement("div"); panel.className="panel";
  const head = document.createElement("div");
  head.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;";
  head.innerHTML=`<h2 style="margin:0;">Tareas pendientes</h2>`;

  addBtn.onclick=()=>{
    DATA.tasks.unshift({id:uid(), title:"", status:"No realizada", done:false});
    save(); renderAll();
  };
  head.appendChild(addBtn);
  panel.appendChild(head);

  if(DATA.tasks.length===0){
    const e=document.createElement("div"); e.className="empty"; e.textContent="No tenés tareas cargadas.";
    panel.appendChild(e);
  } else {
    const STATUS_ORDER = {"No realizada":0,"En proceso":1,"Hecha":2};
    const sorted = [...DATA.tasks].sort((a,b)=> (STATUS_ORDER[a.status]??0) - (STATUS_ORDER[b.status]??0));
    sorted.forEach(t=>{
      panel.appendChild(renderTaskRow(t));
    });
  }
  container.appendChild(panel);
}

let calMonthOffset = 0;
const DOW = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
const GCAL_TOOL = "mcp__6194127a-c272-4037-9d83-e12070d8385a__list_events";

let gcalEvents = null;   // null = todavía no cargado
let gcalLoading = false;
let gcalError = null;

async function fetchGCalEvents(){
  if(!window.cowork || !window.cowork.callMcpTool) return;
  gcalLoading = true; gcalError = null;
  renderAll();
  try{
    const now = new Date();
    const end = new Date(now.getTime() + 1000*60*60*24*60); // próximos 60 días
    const res = await window.cowork.callMcpTool(GCAL_TOOL, {
      startTime: now.toISOString(),
      endTime: end.toISOString(),
      pageSize: 20,
      orderBy: "startTime"
    });
    if(res.isError) throw new Error("tool error");
    const data = res.structuredContent ?? JSON.parse(res.content[0].text);
    gcalEvents = (data.events||[]).map(ev=>{
      const isAllDay = !!(ev.start && ev.start.date);
      const dateStr = isAllDay
        ? String(ev.start.date).slice(0,10)
        : (ev.start && ev.start.dateTime ? String(ev.start.dateTime).slice(0,10) : null);
      const timeStr = (!isAllDay && ev.start && ev.start.dateTime)
        ? new Date(ev.start.dateTime).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})
        : null;
      return { id:ev.id, title:ev.summary || "(Sin título)", date:dateStr, time:timeStr, link:ev.htmlLink };
    }).filter(e=>e.date);
  }catch(e){
    console.warn("No se pudo cargar Google Calendar", e);
    gcalError = String(e);
    gcalEvents = [];
  }
  gcalLoading = false;
  renderAll();
}

function renderCalendario(container){
  const now = new Date();
  const view = new Date(now.getFullYear(), now.getMonth()+calMonthOffset, 1);
  const year = view.getFullYear(), month = view.getMonth();
  const monthLabel = view.toLocaleDateString("es-AR",{month:"long", year:"numeric"});

  // panel: google calendar preview
  const gPanel = document.createElement("div"); gPanel.className="panel";
  const gHead = document.createElement("div");
  gHead.style.cssText = "display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:8px;";
  const canUseGCal = !!(window.cowork && window.cowork.callMcpTool);
  let statusTag = "";
  if(!canUseGCal){
    statusTag = `<span class="tag grey">No disponible en esta vista</span>`;
  } else if(gcalLoading){
    statusTag = `<span class="tag amber">Cargando…</span>`;
  } else if(gcalError){
    statusTag = `<span class="tag red">Error al cargar</span>`;
  } else if(gcalEvents){
    statusTag = `<span class="tag green">Conectado</span>`;
  } else {
    statusTag = `<span class="tag amber">Conectando…</span>`;
  }
  gHead.innerHTML = `
    <div>
      <h2 style="margin:0 0 4px;">Google Calendar</h2>
      <div style="font-size:12.5px; color:var(--ink-soft);">
        Agendá los eventos desde Google Calendar — acá los previsualizás.
      </div>
    </div>`;
  const gRight = document.createElement("div"); gRight.style.cssText="display:flex; align-items:center; gap:8px;";
  gRight.innerHTML = statusTag;
  if(canUseGCal){
    const refreshBtn = document.createElement("button");
    refreshBtn.className = "btn ghost small"; refreshBtn.textContent = "↻ Actualizar";
    refreshBtn.onclick = ()=>fetchGCalEvents();
    gRight.appendChild(refreshBtn);
  }
  gHead.appendChild(gRight);
  gPanel.appendChild(gHead);

  if(!canUseGCal){
    const e = document.createElement("div"); e.className="empty";

    gPanel.appendChild(e);
  } else if(gcalEvents===null){
    if(!gcalLoading) fetchGCalEvents();
    const e = document.createElement("div"); e.className="empty"; e.textContent="Cargando tus próximos eventos…";
    gPanel.appendChild(e);
  } else if(gcalError){
    const e = document.createElement("div"); e.className="empty"; e.textContent="No se pudieron cargar los eventos. Probá actualizar.";
    gPanel.appendChild(e);
  } else if(gcalEvents.length===0){
    const e = document.createElement("div"); e.className="empty"; e.textContent="No tenés eventos próximos en Google Calendar.";
    gPanel.appendChild(e);
  } else {
    gcalEvents.slice(0,8).forEach(ev=>{
      const row = document.createElement("a"); row.className="event-row"; row.href=ev.link||"#"; row.target="_blank"; row.rel="noopener";
      row.style.cssText = "text-decoration:none; color:inherit; cursor:pointer;";
      const d = ev.date ? new Date(ev.date+"T00:00:00") : null;
      const dateBox = document.createElement("div"); dateBox.className="event-date";
      dateBox.innerHTML = d ? `<div>${d.toLocaleDateString("es-AR",{month:"short"}).replace(".","")}</div><div class="d">${d.getDate()}</div>` : `<div class="d">—</div>`;
      row.appendChild(dateBox);
      const mid = document.createElement("div"); mid.style.flex="1"; mid.style.minWidth="0";
      mid.innerHTML = `<div style="font-weight:600; font-size:13px;">${ev.title}</div><div style="font-size:11.5px; color:var(--ink-soft);">${ev.time ? ev.time : "Todo el día"}</div>`;
      row.appendChild(mid);
      gPanel.appendChild(row);
    });
  }
  container.appendChild(gPanel);

  // panel: month grid
  const calPanel = document.createElement("div"); calPanel.className="panel";
  const head = document.createElement("div");
  head.style.cssText = "display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;";
  const navWrap = document.createElement("div"); navWrap.style.cssText="display:flex; align-items:center; gap:10px;";
  const prevBtn = document.createElement("button"); prevBtn.className="btn ghost small"; prevBtn.textContent="‹";
  prevBtn.onclick = ()=>{ calMonthOffset--; renderAll(); };
  const nextBtn = document.createElement("button"); nextBtn.className="btn ghost small"; nextBtn.textContent="›";
  nextBtn.onclick = ()=>{ calMonthOffset++; renderAll(); };
  const label = document.createElement("h2"); label.style.margin="0"; label.style.textTransform="capitalize";
  label.textContent = monthLabel;
  navWrap.appendChild(prevBtn); navWrap.appendChild(label); navWrap.appendChild(nextBtn);
  head.appendChild(navWrap);
  if(calMonthOffset!==0){
    const todayBtn = document.createElement("button"); todayBtn.className="btn ghost small"; todayBtn.textContent="Hoy";
    todayBtn.onclick=()=>{ calMonthOffset=0; renderAll(); };
    head.appendChild(todayBtn);
  }
  calPanel.appendChild(head);

  const grid = document.createElement("div"); grid.className="cal-grid";
  DOW.forEach(d=>{ const e=document.createElement("div"); e.className="cal-dow"; e.textContent=d; grid.appendChild(e); });

  const firstDay = new Date(year, month, 1);
  let startOffset = firstDay.getDay()-1; if(startOffset<0) startOffset=6; // week starts Monday
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const eventsByDate = {};
  DATA.events.forEach(ev=>{ if(ev.date){ (eventsByDate[ev.date] ||= []).push(ev); } });
  (gcalEvents||[]).forEach(ev=>{ if(ev.date){ (eventsByDate[ev.date] ||= []).push(ev); } });

  for(let i=0;i<startOffset;i++){ const e=document.createElement("div"); e.className="cal-cell empty"; grid.appendChild(e); }
  for(let day=1; day<=daysInMonth; day++){
    const cell = document.createElement("div"); cell.className="cal-cell";
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    if(iso===todayISO()) cell.classList.add("today");
    cell.innerHTML = `<div class="n">${day}</div>`;
    if(eventsByDate[iso]) cell.appendChild(Object.assign(document.createElement("div"), {className:"cal-dot", title:eventsByDate[iso].map(e=>e.title).join(", ")}));
    grid.appendChild(cell);
  }
  calPanel.appendChild(grid);
  container.appendChild(calPanel);

  // panel: recordatorios / próximos
  const evPanel = document.createElement("div"); evPanel.className="panel";
  const evHead = document.createElement("div");
  evHead.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;";
  evHead.innerHTML=`<h2 style="margin:0;">Próximos</h2>`;
  const addBtn = document.createElement("button");
  addBtn.className="btn small"; addBtn.textContent="+ Nuevo recordatorio";
  addBtn.onclick=()=>{
    DATA.events.unshift({id:uid(), date:todayISO(), title:"", notes:""});
    save(); renderAll();
  };
  evHead.appendChild(addBtn);
  evPanel.appendChild(evHead);

  const sorted = [...DATA.events].sort((a,b)=> (a.date||"").localeCompare(b.date||""));
  if(sorted.length===0){
    const e=document.createElement("div"); e.className="empty"; e.textContent="No tenés recordatorios cargados.";
    evPanel.appendChild(e);
  } else {
    sorted.forEach(ev=>{
      const row = document.createElement("div"); row.className="event-row";
      const d = ev.date ? new Date(ev.date+"T00:00:00") : null;
      const dateBox = document.createElement("div"); dateBox.className="event-date";
      dateBox.innerHTML = d ? `<div>${d.toLocaleDateString("es-AR",{month:"short"}).replace(".","")}</div><div class="d">${d.getDate()}</div>` : `<div class="d">—</div>`;
      row.appendChild(dateBox);

      const mid = document.createElement("div"); mid.style.flex="1"; mid.style.minWidth="0";
      const titleInp = makeTextInput(ev.title, v=>{ev.title=v; save();}, "text", "Título", ev.id+"-title");
      titleInp.style.fontWeight="600"; titleInp.style.marginBottom="4px";
      mid.appendChild(titleInp);
      const dateInp = makeTextInput(ev.date, v=>{ev.date=v; save(); debouncedRenderAll();}, "date", "", ev.id+"-date");
      dateInp.style.maxWidth="150px";
      mid.appendChild(dateInp);
      row.appendChild(mid);

      const del = document.createElement("button"); del.className="iconbtn"; del.textContent="✕";
      del.onclick=()=>{ softDelete("events", ev); };
      row.appendChild(del);
      evPanel.appendChild(row);
    });
  }
  container.appendChild(evPanel);
}

/* ---------- CONTENIDO (publicado): Reels/Carruseles + Historias ---------- */
const CONTENT_FORMATS = ["Reel","Carrusel","Otro"];
const CONTENT_CATEGORIES = ["Reflexión","Conexión","Opinión","Orgánico","Backstage","Pov","Antes/Después","Exposición","Cinematic","Aprendizaje","Recomendaciones","Valor","Creatividad/Proceso","Otro"];
const CONTENT_STATUS_COLOR = {"Realizado":"green","Prueba":"amber","No subido":"red"};

function makeContentStatusSelect(value, onChange){
  const sel = document.createElement("select");
  const cls = CONTENT_STATUS_COLOR[value] || "amber";
  sel.className = "cell-input status-select status-"+cls;
  Object.keys(CONTENT_STATUS_COLOR).forEach(o=>{
    const op = document.createElement("option");
    op.value = o; op.textContent = o;
    if(o===value) op.selected = true;
    sel.appendChild(op);
  });
  sel.onchange = ()=>{
    const newCls = CONTENT_STATUS_COLOR[sel.value] || "amber";
    sel.className = "cell-input status-select status-"+newCls;
    onChange(sel.value);
  };
  return sel;
}

function makeUploadedSelect(value, onChange){
  const sel = document.createElement("select");
  const cls = value==="Sí" ? "green" : "grey";
  sel.className = "cell-input status-select status-"+cls;
  ["Sí","No"].forEach(o=>{
    const op = document.createElement("option");
    op.value = o; op.textContent = o;
    if(o===value) op.selected = true;
    sel.appendChild(op);
  });
  sel.onchange = ()=>{
    sel.className = "cell-input status-select status-"+(sel.value==="Sí"?"green":"grey");
    onChange(sel.value);
  };
  return sel;
}

function renderMobileContenidoSummary(container){
  const tag = document.createElement("div"); tag.className="section-tag"; tag.textContent="Resumen rápido";
  const wrap = document.createElement("div"); wrap.className="mobile-summary"; wrap.appendChild(tag);
  container.appendChild(wrap);

  const now = new Date();
  const curMonthKey = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const isThisMonth = (dateStr)=> !!dateStr && dateStr.slice(0,7)===curMonthKey;

  const reelsPending = DATA.content.filter(c=>(c.status||"Prueba")==="No subido").length;
  const reelsPublishedMonth = DATA.content.filter(c=>(c.status||"Prueba")==="Realizado" && isThisMonth(c.date)).length;
  const storiesPending = DATA.stories.filter(s=>(s.uploaded||"No")==="No").length;
  const storiesPublishedMonth = DATA.stories.filter(s=>(s.uploaded||"No")==="Sí" && isThisMonth(s.date)).length;

  function miniCard(title, pendingLbl, pendingVal, doneLbl, doneVal){
    const c = document.createElement("div"); c.className="panel"; c.style.marginBottom="0";
    c.innerHTML = `<h2 style="margin:0 0 10px; font-size:13.5px;">${title}</h2>
      <div style="display:flex; gap:10px;">
        <div style="flex:1;"><div style="font-size:11px;color:var(--ink-soft);">${pendingLbl}</div><div style="font-size:19px;font-weight:700;color:var(--ink);">${pendingVal}</div></div>
        <div style="flex:1;"><div style="font-size:11px;color:var(--ink-soft);">${doneLbl}</div><div style="font-size:19px;font-weight:700;color:var(--green);">${doneVal}</div></div>
      </div>`;
    return c;
  }
  const cardsRow = document.createElement("div");
  cardsRow.style.cssText="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;";
  cardsRow.appendChild(miniCard("Reels / Carruseles","Sin subir",reelsPending,"Public. este mes",reelsPublishedMonth));
  cardsRow.appendChild(miniCard("Historias","Sin subir",storiesPending,"Public. este mes",storiesPublishedMonth));
  container.appendChild(cardsRow);

  // estado general del plan de contenido
  const planTotal = DATA.contentPlan.length;
  const planPublished = DATA.contentPlan.filter(c=>c.status==="Publicado").length;
  if(planTotal>0){
    const pct = Math.round(planPublished/planTotal*100);
    const panel = document.createElement("div"); panel.className="panel";
    panel.innerHTML = `<h2 style="margin:0 0 10px;">Estado general del plan</h2>
      <div style="display:flex; align-items:center; gap:14px;">
        <div style="font-size:26px; font-weight:700; color:var(--accent-1); flex-shrink:0;">${pct}%</div>
        <div style="flex:1;">
          <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;"></div></div>
          <div style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;">${planPublished} publicadas de ${planTotal} planificadas</div>
        </div>
      </div>`;
    container.appendChild(panel);
  }

  // contenido reciente
  const recent = [...DATA.content].filter(c=>c.date).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);
  if(recent.length){
    const listPanel = document.createElement("div"); listPanel.className="panel";
    listPanel.innerHTML = `<h2 style="margin:0 0 6px;">Contenido reciente</h2>`;
    recent.forEach(c=>{
      const row = document.createElement("div"); row.className="mini-card-row";
      row.innerHTML = `<div><div class="title">${c.tema||"(sin tema)"}</div><div class="meta">${c.format||"Reel"} · ${fmtDateNice(c.date)}</div></div>
        <span class="tag ${CONTENT_STATUS_COLOR[c.status]||"amber"}">${c.status||"Prueba"}</span>`;
      listPanel.appendChild(row);
    });
    container.appendChild(listPanel);
  }
}
