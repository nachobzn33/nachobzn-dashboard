    card.appendChild(notes);

    panel.appendChild(card);
  });
  container.appendChild(panel);
}

/* ---------- INSTAGRAM (insights derivados del contenido cargado) ---------- */
let igCharts = [];
function destroyIgCharts(){ igCharts.forEach(c=>{ try{c.destroy();}catch(e){} }); igCharts=[]; }
function numOrNull(v){
  if(v===undefined||v===null||v===""||v==="-") return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}
const CHART_AXIS_OPTS = {
  ticks:{ color:"#92929d", font:{size:9.5} },
  grid:{ color:"rgba(255,255,255,.05)" }
};

function renderInstagram(container){
  // panel de estado de conexión
  const gPanel = document.createElement("div"); gPanel.className="panel";
  gPanel.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
      <div>
        <h2 style="margin:0 0 4px;">Instagram</h2>
        <div style="font-size:12.5px; color:var(--ink-soft); max-width:560px;">
          No hay una forma simple de conectar tu cuenta personal de Instagram directamente (Meta no lo permite sin una cuenta business + herramientas de terceros).
          Mientras tanto, este panel analiza automáticamente las métricas que cargás en la pestaña Contenido para mostrarte qué está funcionando.
        </div>
      </div>
      <span class="tag amber">Análisis desde Contenido</span>
    </div>`;
  container.appendChild(gPanel);

  const items = DATA.content.filter(c=>numOrNull(c.views)!==null);
  if(items.length===0){
    const e = document.createElement("div"); e.className="panel";
    e.innerHTML = `<div class="empty">Todavía no hay piezas con vistas cargadas. Sumá datos en la pestaña Contenido (Reels/Carruseles) y acá vas a ver el análisis automáticamente.</div>`;
    container.appendChild(e);
    return;
  }

  const sum = (key)=>items.reduce((a,c)=>a+(numOrNull(c[key])||0),0);
  const totalViews = sum("views"), totalLikes = sum("likes"), totalSaves = sum("saves"), totalShares = sum("shares"), totalComments = sum("comments");
  const withEngagement = items.filter(c=>numOrNull(c.views)>0);
  const avgEngagement = withEngagement.length
    ? withEngagement.reduce((a,c)=>a+(((numOrNull(c.likes)||0)+(numOrNull(c.comments)||0)+(numOrNull(c.saves)||0)+(numOrNull(c.shares)||0))/numOrNull(c.views)*100),0)/withEngagement.length
    : 0;
  const best = [...items].sort((a,b)=>(numOrNull(b.views)||0)-(numOrNull(a.views)||0))[0];

  destroyIgCharts();

  const kpis = document.createElement("div"); kpis.className="kpis";
  [
    ["Vistas totales", fmtMoney(totalViews)],
    ["Likes totales", fmtMoney(totalLikes)],
    ["Engagement promedio", avgEngagement.toFixed(1)+"%"],
    ["Mejor pieza", best ? (best.tema||"(sin tema)").slice(0,28) : "—"],
  ].forEach(([lbl,val])=>{
    const k=document.createElement("div"); k.className="kpi";
    k.innerHTML = `<div class="lbl">${lbl}</div><div class="val" style="font-size:${lbl==="Mejor pieza"?"15px":"21px"};">${val}</div>`;
    kpis.appendChild(k);
  });
  container.appendChild(kpis);

  // gráfico: vistas a lo largo del tiempo
  const sortedByDate = [...items].filter(c=>c.date).sort((a,b)=>a.date.localeCompare(b.date));
  if(sortedByDate.length>1){
    const trendPanel = document.createElement("div"); trendPanel.className="panel";
    trendPanel.innerHTML = `<h2 style="margin:0 0 12px;">Vistas por publicación a lo largo del tiempo</h2>`;
    const wrap = document.createElement("div"); wrap.style.cssText="height:220px; position:relative;";
    const canvas = document.createElement("canvas"); wrap.appendChild(canvas);
    trendPanel.appendChild(wrap);
    container.appendChild(trendPanel);
    if(window.Chart){
      igCharts.push(new Chart(canvas.getContext("2d"), {
        type:"line",
        data:{
          labels: sortedByDate.map(c=>c.date),
          datasets:[{
            label:"Vistas", data: sortedByDate.map(c=>numOrNull(c.views)||0),
            borderColor:"#22c55e", backgroundColor:"rgba(34,197,94,.18)", fill:true, tension:.3, pointRadius:2
          }]
        },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{ x:CHART_AXIS_OPTS, y:CHART_AXIS_OPTS }
        }
      }));
    }
  }

  // gráfico: promedio de vistas por categoría
  const byCat = {};
  items.forEach(c=>{
    const cat = (c.category||"Sin categoría").trim() || "Sin categoría";
    if(!byCat[cat]) byCat[cat] = {sum:0,count:0};
    byCat[cat].sum += numOrNull(c.views)||0;
    byCat[cat].count++;
  });
  const catLabels = Object.keys(byCat);
  if(catLabels.length>0){
    const catPanel = document.createElement("div"); catPanel.className="panel";
    catPanel.innerHTML = `<h2 style="margin:0 0 12px;">Promedio de vistas por categoría</h2>`;
    const wrap = document.createElement("div"); wrap.style.cssText="height:220px; position:relative;";
    const canvas = document.createElement("canvas"); wrap.appendChild(canvas);
    catPanel.appendChild(wrap);
    container.appendChild(catPanel);
    if(window.Chart){
      igCharts.push(new Chart(canvas.getContext("2d"), {
        type:"bar",
        data:{
          labels: catLabels,
          datasets:[{ data: catLabels.map(c=>Math.round(byCat[c].sum/byCat[c].count)), backgroundColor:"#0ea5e9", borderRadius:6 }]
        },
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{ x:CHART_AXIS_OPTS, y:CHART_AXIS_OPTS }
        }
      }));
    }
  }

  // top / bottom performers
  const ranked = [...items].sort((a,b)=>(numOrNull(b.views)||0)-(numOrNull(a.views)||0));
  const top5 = ranked.slice(0,5);
  const bottom5 = ranked.slice(-5).reverse();

  function rankPanel(title, list, colorVar){
    const p = document.createElement("div"); p.className="panel";
    p.innerHTML = `<h2 style="margin:0 0 10px;">${title}</h2>`;
    if(list.length===0){
      const e=document.createElement("div"); e.className="empty"; e.textContent="Sin datos."; p.appendChild(e);
    } else {
      list.forEach(c=>{
        const row = document.createElement("div");
        row.style.cssText="display:flex; justify-content:space-between; align-items:center; gap:10px; padding:7px 2px; border-bottom:1px solid var(--line);";
        row.innerHTML = `
          <div style="min-width:0;">
            <div style="font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px;">${c.tema||"(sin tema)"}</div>
            <div style="font-size:11px; color:var(--ink-soft);">${c.category||"—"} · ${c.date||"—"}</div>
          </div>
          <div style="font-weight:700; color:var(--${colorVar}); white-space:nowrap;">${fmtMoney(numOrNull(c.views)||0)} vistas</div>
        `;
        p.appendChild(row);
      });
    }
    container.appendChild(p);
  }
  rankPanel("Lo que mejor funcionó", top5, "green");
  rankPanel("Lo que menos funcionó", bottom5, "red");
}

/* ---------- PLAN DE CONTENIDO ---------- */
function renderPlanContenido(container){
  const panel = document.createElement("div"); panel.className="panel";
  const head = document.createElement("div");
  head.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;";
  head.innerHTML=`<h2 style="margin:0;">Plan de contenido</h2>`;
  const addBtn = document.createElement("button");
  addBtn.className="btn small"; addBtn.textContent="+ Nueva idea";
  addBtn.onclick=()=>{
    DATA.contentPlan.unshift({id:uid(), title:"", platform:"Instagram", date:"", status:"Idea", notes:""});
    save(); renderAll();
  };
  head.appendChild(addBtn);
  panel.appendChild(head);

  if(DATA.contentPlan.length===0){
    const e=document.createElement("div"); e.className="empty"; e.textContent="No hay ideas en el plan todavía.";
    panel.appendChild(e);
  } else {
    const tableWrap = document.createElement("div"); tableWrap.style.overflowX="auto";
    const table = document.createElement("table");
    table.className = "rtable";
    table.innerHTML = `<thead><tr><th>Idea / título</th><th>Plataforma</th><th>Fecha planeada</th><th>Estado</th><th>Notas</th><th></th></tr></thead>`;
    const tbody = document.createElement("tbody");
    DATA.contentPlan.forEach(c=>{
      const tr = document.createElement("tr");
      const ideaInp = makeTextInput(c.title, v=>{c.title=v; save();}, "text","Idea"); ideaInp.style.minWidth="170px";
      tr.appendChild(td("Idea", ideaInp));
      tr.appendChild(td("Plataforma", makeSelect(c.platform, ["Instagram","YouTube","TikTok","Blog","Newsletter","LinkedIn","X","Otro"], v=>{c.platform=v; save();})));
      tr.appendChild(td("Fecha planeada", makeTextInput(c.date, v=>{c.date=v; save();}, "date")));
      tr.appendChild(td("Estado", makeSelect(c.status, ["Idea","Guion","Grabado","Editado","Publicado"], v=>{c.status=v; save();})));
      const planNotesInp = makeTextInput(c.notes, v=>{c.notes=v; save();}, "text","Notas"); planNotesInp.style.minWidth="140px";
      tr.appendChild(td("Notas", planNotesInp));
      const del=document.createElement("button"); del.className="iconbtn"; del.textContent="✕";
      del.onclick=()=>{ softDelete("contentPlan", c); };
      tr.appendChild(td(null, del));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    panel.appendChild(tableWrap);
  }
  container.appendChild(panel);
}

/* ---------- ESTRATEGIA ---------- */
function renderEstrategia(container){
  const panel = document.createElement("div"); panel.className="panel";
  panel.innerHTML = `<h2>Estrategia</h2>`;
  const fields = [
    ["vision","Visión / misión","¿Hacia dónde vas y por qué?"],
    ["audience","Público objetivo","¿A quién le hablás?"],
    ["pillars","Pilares de contenido","Los 3-5 temas centrales de tu contenido"],
    ["edge","Diferenciación / propuesta de valor","¿Qué te hace distinto?"],
    ["goals6m","Objetivos a 6-12 meses","Hacia dónde apuntás en el mediano plazo"],
  ];
  fields.forEach(([key,label,ph])=>{
    const lab = document.createElement("div"); lab.className="field-label"; lab.textContent=label;
    panel.appendChild(lab);
    const ta = document.createElement("textarea");
    ta.placeholder = ph;
    ta.value = DATA.strategy[key] || "";
    ta.oninput = ()=>{ DATA.strategy[key]=ta.value; save(); };
    panel.appendChild(ta);
  });
  container.appendChild(panel);
}

/* ---------- NOTAS MENTALES ---------- */
function renderNotas(container){
  const panel1 = document.createElement("div"); panel1.className="panel";
  panel1.innerHTML = `<h2>Hoja en blanco</h2>`;
  const ta = document.createElement("textarea");
  ta.style.minHeight="120px";
  ta.placeholder = "Lo que tengas en la cabeza ahora mismo...";
  ta.value = DATA.notes.scratch || "";
  ta.oninput = ()=>{ DATA.notes.scratch = ta.value; save(); };
  panel1.appendChild(ta);
  container.appendChild(panel1);

  const panel2 = document.createElement("div"); panel2.className="panel";
  const head = document.createElement("div");
  head.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;";
  head.innerHTML=`<h2 style="margin:0;">Bitácora de ideas</h2>`;
  const addBtn = document.createElement("button");
  addBtn.className="btn small"; addBtn.textContent="+ Agregar nota";
  addBtn.onclick=()=>{
    const txt = prompt("Escribí tu idea / pensamiento:");
    if(txt && txt.trim()){
      DATA.notes.entries.unshift({id:uid(), date:new Date().toISOString(), text:txt.trim()});
      save(); renderAll();
    }
  };
  head.appendChild(addBtn);
  panel2.appendChild(head);

  if(DATA.notes.entries.length===0){
    const e=document.createElement("div"); e.className="empty"; e.textContent="Sin notas todavía. Agregá la primera.";
    panel2.appendChild(e);
  } else {
    DATA.notes.entries.forEach(n=>{
      const div = document.createElement("div"); div.className="journal-entry";
      const d = new Date(n.date);
      const meta = document.createElement("div"); meta.className="meta";
      const dateSpan = document.createElement("span"); dateSpan.textContent = d.toLocaleString("es-AR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
      meta.appendChild(dateSpan);
      const del = document.createElement("button"); del.className="iconbtn"; del.textContent="✕";
      del.onclick=()=>{ softDelete("notesEntries", n); };
      meta.appendChild(del);
      div.appendChild(meta);
      const txt = document.createElement("div"); txt.className="txt"; txt.textContent = n.text;
      div.appendChild(txt);
      panel2.appendChild(div);
    });
  }
  container.appendChild(panel2);
}

  instagram: renderInstagram,

};

// Detecta vista mobile (mismo corte que el media query de CSS, 760px) para
// mostrar el resumen tipo dashboard arriba de cada pestaña, sin tocar la
// vista de escritorio (que sigue exactamente igual que siempre).
function isMobileView(){ return window.innerWidth <= 760; }
let __wasMobile = isMobileView();
window.addEventListener("resize", debounce(()=>{
  const nowMobile = isMobileView();
  if(nowMobile !== __wasMobile){ __wasMobile = nowMobile; renderAll(); }
}, 200));

(async function init(){
  DATA = await loadRemote();
  buildSidebar();
  if(autoDeleteStaleTasks()){ /* ya quedó reflejado, el renderAll de abajo lo pinta */ }
  renderAll();
  // barrido de fondo cada 15 minutos, para que las tareas "Hecha" se limpien
  // solas a las 48hs aunque te quedes con la pestaña de Tareas cerrada.
  setInterval(()=>{ if(autoDeleteStaleTasks() && activeTab==="tareas") renderAll(); }, 15*60*1000);
})();
</script>
